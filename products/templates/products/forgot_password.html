{% extends "base.html" %}
{% block title %}Forgot Password | GENX{% endblock %}

{% block content %}
<style>
    .auth-wrapper {
        min-height: 90vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, var(--white), var(--gray-light));
        padding: 20px;
    }

    .auth-card {
        width: 100%;
        max-width: 420px;
        background: var(--white);
        border-radius: 12px;
        padding: 40px 35px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.08);
        border: 1px solid var(--gray-medium);
        animation: fadeUp 0.6s ease;
    }

    .auth-title {
        text-align: center;
        font-weight: 700;
        margin-bottom: 15px;
        color: var(--brown-dark);
        font-size: 1.8rem;
    }

    .auth-desc {
        text-align: center;
        color: var(--brown-medium);
        margin-bottom: 30px;
        font-size: 0.95rem;
    }

    .auth-input {
        border-radius: 8px;
        padding: 14px 18px;
        font-size: 1rem;
        border: 1.5px solid var(--gray-medium);
        transition: 0.3s;
    }

    .auth-input:focus {
        border-color: var(--brown-medium);
        box-shadow: 0 0 0 3px rgba(109,76,65,0.15);
        outline: none;
    }

    .auth-btn {
        width: 100%;
        padding: 14px;
        border-radius: 8px;
        border: none;
        font-weight: 600;
        margin-top: 20px;
        color: var(--white);
        background: var(--brown-dark);
        transition: 0.3s;
    }

    .auth-btn:hover {
        background: var(--brown-medium);
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(109,76,65,0.2);
    }

    .success-message {
        display: none;
        text-align: center;
        margin-top: 20px;
        color: #28a745;
        font-weight: 600;
    }

    .back-link {
        display: block;
        text-align: center;
        margin-top: 25px;
        color: var(--brown-medium);
        font-weight: 600;
        text-decoration: none;
    }

    .back-link:hover {
        color: var(--brown-dark);
        text-decoration: underline;
    }
</style>

<div class="auth-wrapper">
    <div class="auth-card">

        <h2 class="auth-title">Forgot Password</h2>
        <p class="auth-desc">
            Enter your registered email address and we’ll send you a reset link.
        </p>

        <form id="forgotForm">
            <div class="mb-4">
                <label class="form-label fw-bold text-brown-dark">Email Address</label>
                <input type="email" class="form-control auth-input" placeholder="Enter your email" required>
            </div>

            <button type="submit" class="auth-btn">Send Reset Link</button>
        </form>

        <div class="success-message" id="successMsg">
            ✔ Reset link sent successfully (demo)
        </div>

        <a href="#" class="back-link">← Back to Login</a>

    </div>
</div>

<script>
    document.getElementById('forgotForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const successMsg = document.getElementById('successMsg');
        successMsg.style.display = 'block';
    });
</script>
{% endblock %}
